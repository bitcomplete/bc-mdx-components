name: release

# Publish @bitcomplete/mdx-components to npm when the version in
# package.json changes on main. Releases are intentional: bump the
# version in a PR, merge, and this workflow publishes that exact
# version with npm provenance, tags vX.Y.Z, and attaches the built
# bundle to a GitHub Release for humans.
#
# Pushes to main that don't change the version are no-ops here (ci.yml
# still tests every push). Downstream consumers (pin) pull the bundle
# from the published npm tarball — see pin's bump-mdx-bundle workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write # npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile

      - name: Check if this version is already published
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          if npm view "@bitcomplete/mdx-components@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "v${PKG_VERSION} already on npm; nothing to release"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - run: pnpm typecheck
        if: steps.version.outputs.publish == 'true'
      - run: pnpm test
        if: steps.version.outputs.publish == 'true'
      - run: pnpm build
        if: steps.version.outputs.publish == 'true'
      - name: Verify IIFE bundle is self-contained
        if: steps.version.outputs.publish == 'true'
        run: |
          test -f dist/bundle.iife.global.js
          node -e "const fs=require('fs');const src=fs.readFileSync('dist/bundle.iife.global.js','utf8');if(!src.includes('compileMDX'))process.exit(1)"

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Tag + GitHub Release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          sha256sum dist/bundle.iife.global.js > dist/bundle.iife.global.js.sha256
          gh release create "${TAG}" \
            dist/bundle.iife.global.js \
            dist/bundle.iife.global.js.sha256 \
            --title "${TAG}" \
            --notes "Published to npm as @bitcomplete/mdx-components@${{ steps.version.outputs.version }} (from ${GITHUB_SHA})."
